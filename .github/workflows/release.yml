name: Release

# Se activa con tags que coinciden con formato de versión (ej: 1.0.0)
# IMPORTANTE: El tag NO debe tener prefijo 'v' para Obsidian
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # Solo tags numéricos: 1.0.0, 1.1.0, etc.

env:
  PLUGIN_NAME: obsidian-direct-response-pm  # ID del plugin desde manifest.json

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run check

      - name: Build plugin
        run: npm run build
        # Esto genera main.js en la raíz del proyecto

      - name: Create release directory
        run: |
          mkdir -p ${{ env.PLUGIN_NAME }}

      - name: Copy files to release directory
        run: |
          cp main.js ${{ env.PLUGIN_NAME }}/
          cp manifest.json ${{ env.PLUGIN_NAME }}/
          cp styles.css ${{ env.PLUGIN_NAME }}/ 2>/dev/null || echo "styles.css no encontrado"
          ls -la ${{ env.PLUGIN_NAME }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # Archivos para subir como assets individuales (requerido por Obsidian)
          files: |
            main.js
            manifest.json
            styles.css
          # NO marcar como draft (Obsidian necesita release publicado)
          draft: false
          # NO marcar como pre-release
          prerelease: false
          # Generar release notes desde CHANGELOG.md
          generate_release_notes: true
          body_path: CHANGELOG.md
          # Nombre del release desde el tag (sin prefijo 'v')
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on Discord (optional)
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Release ${{ github.ref_name }}"
          description: "New release of Direct Response Project Manager for Obsidian"
          url: https://github.com/antigravity/obsidian-direct-response-pm/releases
          color: 0x667eea
